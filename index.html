<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uluırmak Mesleki ve Teknik Anadolu Lisesi - Formlar</title>
    <!-- Tailwind CSS v4 Browser -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #020617;
        background-image: 
          radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.4) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(88, 28, 135, 0.4) 0px, transparent 50%),
          radial-gradient(at 50% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%);
        height: 100vh;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        color: white;
      }
      /* Frosted Glass Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 8px; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 8px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
  </head>
  <body>
    <div class="min-h-screen p-4 md:p-8 flex flex-col items-center justify-center">
      <div id="app-container" class="w-full max-w-6xl flex flex-col max-h-[90vh] bg-white/5 backdrop-blur-3xl border border-white/10 rounded-3xl p-6 shadow-2xl transition-all duration-700 opacity-0 scale-95 translate-y-4">
        <header class="mb-6 border-b border-white/10 pb-6 text-center shrink-0">
          <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold tracking-tighter mb-2 text-transparent bg-clip-text bg-gradient-to-r from-neutral-100 to-neutral-400">
            Uluırmak Mesleki ve Teknik Anadolu Lisesi
          </h1>
          <h2 class="text-xl md:text-2xl font-medium text-neutral-300">
            Uygulama Oteli
          </h2>
          <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-white/10 border border-white/5 text-sm font-medium text-neutral-300 mt-4 tracking-wide uppercase">
            Formlar
          </div>
        </header>

        <div class="overflow-y-auto pr-3 flex-1 pb-2">
          <!-- Gelecekte Mega linkinden çekilecek olan verilerin listesi: https://mega.nz/folder/0jkwjIoY#MwodxmSsZkevB9D5vn93qA -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="file-list">
            <!-- Dosyalar buraya JS ile yüklenecek -->
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { File } from 'https://esm.sh/megajs@1.3.1?bundle';

      const fileList = document.getElementById('file-list');
      const folderUrl = 'https://mega.nz/folder/0jkwjIoY#MwodxmSsZkevB9D5vn93qA';

      async function loadMegaFiles() {
        fileList.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center py-16 text-neutral-400">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-neutral-500"></i>
            <span class="text-sm font-medium">Mega.nz üzerinden dosyalar senkronize ediliyor...</span>
          </div>
        `;
        lucide.createIcons();

        try {
          const folder = File.fromURL(folderUrl);
          await folder.loadAttributes();
          
          let html = '';
          const children = folder.children || [];
          
          if (children.length === 0) {
            fileList.innerHTML = '<div class="col-span-full text-center text-neutral-400 py-8">Klasörde dosya bulunamadı.</div>';
            return;
          }

          // Global object for accessing later
          window.megaFiles = children;

          children.forEach((file, index) => {
            if (file.directory) return;
            const fileName = file.name;
            const ext = fileName.split('.').pop().toLowerCase();
            const isOffice = ['doc', 'docx', 'xls', 'xlsx'].includes(ext);
            let iconName = 'file-text';
            if (['doc', 'docx'].includes(ext)) iconName = 'file-type-2';
            else if (['xls', 'xlsx'].includes(ext)) iconName = 'table';
            else if (['png', 'jpg', 'jpeg'].includes(ext)) iconName = 'image';
            
            html += `
              <div class="flex items-center justify-between p-3 lg:p-4 bg-white/5 hover:bg-white/10 rounded-2xl transition-all duration-300 border border-white/5 hover:border-white/20 group">
                <div class="flex items-center gap-3 overflow-hidden">
                  <div class="p-2 bg-white/5 rounded-xl group-hover:scale-110 transition-transform duration-300 border border-white/5 shrink-0">
                    <i data-lucide="${iconName}" class="text-neutral-300 w-[18px] h-[18px]"></i>
                  </div>
                  <span class="font-medium text-sm lg:text-base text-neutral-200 truncate" title="${fileName}">
                    ${fileName}
                  </span>
                </div>
                <button onclick="downloadAndPrint(${index})" id="btn-${index}" class="flex items-center gap-1.5 px-3 py-1.5 ${isOffice ? 'bg-indigo-600/30 hover:bg-indigo-500/50' : 'bg-neutral-800/50 hover:bg-neutral-700/80'} border border-white/10 rounded-lg text-xs lg:text-sm text-neutral-200 transition-colors shrink-0 whitespace-nowrap cursor-pointer">
                  <i data-lucide="${isOffice ? 'download' : 'printer'}" class="w-[14px] h-[14px]"></i> <span id="btn-text-${index}">${isOffice ? 'İndir' : 'Yazdır'}</span>
                </button>
              </div>
            `;
          });
          
          fileList.innerHTML = html;
          lucide.createIcons();

        } catch (error) {
          console.error("Mega.nz Fetch Error:", error);
          fileList.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center py-12 text-red-400/80">
              <i data-lucide="alert-circle" class="w-10 h-10 mb-4 opacity-80"></i>
              <span class="font-medium">Mega klasör verileri alınamadı. Linki kontrol ediniz.</span>
            </div>
          `;
          lucide.createIcons();
        }
      }

      window.downloadAndPrint = async (index) => {
        const file = window.megaFiles[index];
        if (!file) return;
        
        const btn = document.getElementById(`btn-${index}`);
        const btnText = document.getElementById(`btn-text-${index}`);
        const originalText = btnText.innerText;
        btnText.innerText = "İndiriliyor...";
        btn.classList.add("opacity-50", "pointer-events-none");
        
        try {
          // 1. Mega üzerinden dosyayı arabelleğe (buffer) indir
          const data = await file.downloadBuffer();
          
          btnText.innerText = "Hazırlanıyor...";
          
          const fileName = file.name;
          const ext = fileName.split('.').pop().toLowerCase();
          
          const isImage = ['png', 'jpg', 'jpeg'].includes(ext);
          const isPdf = ext === 'pdf';
          const isWord = ['doc', 'docx'].includes(ext);
          const isExcel = ['xls', 'xlsx'].includes(ext);
          const isOffice = isWord || isExcel;
          const canPreview = isImage || isPdf;

          let mimeType = 'application/octet-stream';
          if (isPdf) mimeType = 'application/pdf';
          else if (ext === 'png') mimeType = 'image/png';
          else if (['jpg', 'jpeg'].includes(ext)) mimeType = 'image/jpeg';
          else if (isWord) mimeType = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
          else if (isExcel) mimeType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
          
          // 2. Blob oluştur ve Aynı Sekme (Same-Tab) içinde Önizleme Modalı göster
          const blob = new Blob([data], { type: mimeType });
          const url = URL.createObjectURL(blob);
          
          // Eğer Office dosyası ise önizleme (PDF Yüklenemedi hatası) yapmadan direkt bilgisayara indir
          if (isOffice) {
              const a = document.createElement('a');
              a.href = url;
              a.download = fileName;
              document.body.appendChild(a);
              a.click();
              a.remove();
              setTimeout(() => URL.revokeObjectURL(url), 10000);
              
              btnText.innerText = originalText;
              btn.classList.remove("opacity-50", "pointer-events-none");
              return;
          }

          // Halihazırda açık bir modal varsa temizle
          const existingModal = document.getElementById('mega-preview-modal');
          if (existingModal) existingModal.remove();

          // Modal Arka Planı (Sayfayı tam kaplayan, blurlu)
          const modal = document.createElement('div');
          modal.id = 'mega-preview-modal';
          Object.assign(modal.style, {
              position: 'fixed', top: '0', left: '0', width: '100vw', height: '100vh',
              backgroundColor: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(5px)',
              zIndex: '99999', display: 'flex', flexDirection: 'column'
          });

          // Modal Üst Çubuğu (Başlık ve Butonlar)
          const header = document.createElement('div');
          Object.assign(header.style, {
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '16px 24px', backgroundColor: '#111827', borderBottom: '1px solid #374151'
          });

          const title = document.createElement('h3');
          title.innerText = 'Önizleme: ' + fileName;
          Object.assign(title.style, { color: 'white', margin: '0', fontFamily: 'system-ui, sans-serif' });

          const buttonsGroup = document.createElement('div');
          buttonsGroup.style.display = 'flex';
          buttonsGroup.style.gap = '12px';

          const printBtn = document.createElement('button');
          printBtn.innerHTML = '<svg style="width:18px;height:18px;margin-right:8px;vertical-align:-4px;display:inline-block" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect width="12" height="8" x="6" y="14" rx="1"/></svg>Yazdır';
          Object.assign(printBtn.style, {
              backgroundColor: '#2563eb', color: 'white', border: 'none', padding: '8px 24px',
              borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer', fontSize: '15px'
          });

          const closeBtn = document.createElement('button');
          closeBtn.innerText = 'Kapat';
          Object.assign(closeBtn.style, {
              backgroundColor: '#4b5563', color: 'white', border: 'none', padding: '8px 16px',
              borderRadius: '6px', cursor: 'pointer', fontSize: '15px'
          });

          buttonsGroup.appendChild(printBtn);
          buttonsGroup.appendChild(closeBtn);
          header.appendChild(title);
          header.appendChild(buttonsGroup);

          // Modal İçeriği (Resim veya PDF)
          const content = document.createElement('div');
          Object.assign(content.style, {
              flex: '1', padding: '24px', display: 'flex', justifyContent: 'center',
              alignItems: 'center', overflow: 'hidden'
          });

          let previewElement;
          if (isImage) {
              previewElement = document.createElement('img');
              previewElement.src = url;
              Object.assign(previewElement.style, { maxWidth: '100%', maxHeight: '100%', objectFit: 'contain', borderRadius: '4px' });
              content.appendChild(previewElement);
          } else if (isPdf) {
              previewElement = document.createElement('iframe');
              previewElement.src = url;
              Object.assign(previewElement.style, { width: '100%', height: '100%', border: 'none', borderRadius: '8px', backgroundColor: '#525659' });
              content.appendChild(previewElement);
          }

          modal.appendChild(header);
          modal.appendChild(content);
          document.body.appendChild(modal);

          // İşlemler (Kapatma ve Yazdırma)
          const closeModal = () => {
              modal.remove();
              URL.revokeObjectURL(url);
          };
          closeBtn.onclick = closeModal;

          printBtn.onclick = () => {
              if (isImage) {
                  // Resim Yazdırma (Native Iframe Print)
                  const pIframe = document.createElement('iframe');
                  Object.assign(pIframe.style, { position:'fixed', right:'0', bottom:'0', width:'0', height:'0', border:'0' });
                  document.body.appendChild(pIframe);
                  pIframe.contentDocument.write(`
                    <html>
                      <head><title>${fileName}</title></head>
                      <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;">
                        <img src="${url}" style="max-width:100%;max-height:100%;" onload="window.setTimeout(()=>window.print(),200);" />
                      </body>
                    </html>
                  `);
                  pIframe.contentDocument.close();
                  setTimeout(() => { if(document.body.contains(pIframe)) pIframe.remove(); }, 60000);
              } else {
                  // PDF Yazdırma (Try Print via contentWindow iframe element, fallback gracefully)
                  try {
                      previewElement.contentWindow.focus();
                      previewElement.contentWindow.print();
                  } catch(e) {
                      console.log('Native yazdırma çağrısı engellendi. (Sorun değil, PDF viewer kendi yazdır butonuna sahip)', e);
                      alert("Chrome PDF Eklentisi korumalı modda. Lütfen PDF (karanlık) alanının sağ üstündeki yerleşik 🖨️ Yazıcı simgesini kullanınız.");
                  }
              }
          };

          // Yükleme ve Önizleme tamamlandı. Butonu geri çevir
          btnText.innerText = originalText;
          btn.classList.remove("opacity-50", "pointer-events-none");

        } catch (error) {
          console.error("Mega İndirme/Yazdırma Hatası:", error);
          alert("İşlem sırasında bir hata oluştu.");
        } finally {
          btnText.innerText = originalText;
          btn.classList.remove("opacity-50", "pointer-events-none");
        }
      };

      loadMegaFiles();

      // Animasyon
      setTimeout(() => {
        const container = document.getElementById('app-container');
        if (container) {
          container.classList.remove('opacity-0', 'scale-95', 'translate-y-4');
          container.classList.add('opacity-100', 'scale-100', 'translate-y-0');
        }
      }, 100);
    </script>
  </body>
</html>
