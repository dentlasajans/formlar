<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uluırmak Mesleki ve Teknik Anadolu Lisesi - Formlar</title>
    <!-- Tailwind CSS v4 Browser -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #020617;
        background-image: 
          radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.4) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(88, 28, 135, 0.4) 0px, transparent 50%),
          radial-gradient(at 50% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%);
        height: 100vh;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        color: white;
      }
      /* Frosted Glass Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 8px; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 8px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
  </head>
  <body>
    <div class="min-h-screen p-4 md:p-8 flex flex-col items-center justify-center">
      <div id="app-container" class="w-full max-w-6xl flex flex-col max-h-[90vh] bg-white/5 backdrop-blur-3xl border border-white/10 rounded-3xl p-6 shadow-2xl transition-all duration-700 opacity-0 scale-95 translate-y-4">
        <header class="mb-6 border-b border-white/10 pb-6 text-center shrink-0">
          <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold tracking-tighter mb-2 text-transparent bg-clip-text bg-gradient-to-r from-neutral-100 to-neutral-400">
            Uluırmak Mesleki ve Teknik Anadolu Lisesi
          </h1>
          <h2 class="text-xl md:text-2xl font-medium text-neutral-300">
            Uygulama Oteli
          </h2>
          <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-white/10 border border-white/5 text-sm font-medium text-neutral-300 mt-4 tracking-wide uppercase">
            Formlar
          </div>
        </header>

        <div class="overflow-y-auto pr-3 flex-1 pb-2">
          <!-- Gelecekte Mega linkinden çekilecek olan verilerin listesi: https://mega.nz/folder/0jkwjIoY#MwodxmSsZkevB9D5vn93qA -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="file-list">
            <!-- Dosyalar buraya JS ile yüklenecek -->
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { File } from 'https://esm.sh/megajs@1.3.1?bundle';

      const fileList = document.getElementById('file-list');
      const folderUrl = 'https://mega.nz/folder/0jkwjIoY#MwodxmSsZkevB9D5vn93qA';

      async function loadMegaFiles() {
        fileList.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center py-16 text-neutral-400">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-neutral-500"></i>
            <span class="text-sm font-medium">Mega.nz üzerinden dosyalar senkronize ediliyor...</span>
          </div>
        `;
        lucide.createIcons();

        try {
          const folder = File.fromURL(folderUrl);
          await folder.loadAttributes();
          
          let html = '';
          const children = folder.children || [];
          
          if (children.length === 0) {
            fileList.innerHTML = '<div class="col-span-full text-center text-neutral-400 py-8">Klasörde dosya bulunamadı.</div>';
            return;
          }

          // Global object for accessing later
          window.megaFiles = children;

          children.forEach((file, index) => {
            if (file.directory) return;
            const fileName = file.name;
            
            html += `
              <div class="flex items-center justify-between p-3 lg:p-4 bg-white/5 hover:bg-white/10 rounded-2xl transition-all duration-300 border border-white/5 hover:border-white/20 group">
                <div class="flex items-center gap-3 overflow-hidden">
                  <div class="p-2 bg-white/5 rounded-xl group-hover:scale-110 transition-transform duration-300 border border-white/5 shrink-0">
                    <i data-lucide="file-text" class="text-neutral-300 w-[18px] h-[18px]"></i>
                  </div>
                  <span class="font-medium text-sm lg:text-base text-neutral-200 truncate" title="${fileName}">
                    ${fileName}
                  </span>
                </div>
                <button onclick="downloadAndPrint(${index})" id="btn-${index}" class="flex items-center gap-1.5 px-3 py-1.5 bg-neutral-800/50 hover:bg-neutral-700/80 border border-white/10 rounded-lg text-xs lg:text-sm text-neutral-200 transition-colors shrink-0 whitespace-nowrap cursor-pointer">
                  <i data-lucide="printer" class="w-[14px] h-[14px]"></i> <span id="btn-text-${index}">Yazdır</span>
                </button>
              </div>
            `;
          });
          
          fileList.innerHTML = html;
          lucide.createIcons();

        } catch (error) {
          console.error("Mega.nz Fetch Error:", error);
          fileList.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center py-12 text-red-400/80">
              <i data-lucide="alert-circle" class="w-10 h-10 mb-4 opacity-80"></i>
              <span class="font-medium">Mega klasör verileri alınamadı. Linki kontrol ediniz.</span>
            </div>
          `;
          lucide.createIcons();
        }
      }

      window.downloadAndPrint = async (index) => {
        const file = window.megaFiles[index];
        if (!file) return;
        
        const btn = document.getElementById(`btn-${index}`);
        const btnText = document.getElementById(`btn-text-${index}`);
        const originalText = btnText.innerText;
        btnText.innerText = "İndiriliyor...";
        btn.classList.add("opacity-50", "pointer-events-none");
        
        try {
          // 1. Mega üzerinden dosyayı arabelleğe (buffer) indir
          const data = await file.downloadBuffer();
          
          btnText.innerText = "Hazırlanıyor...";
          
          let mimeType = 'application/pdf';
          const fileName = file.name.toLowerCase();
          const isImage = fileName.endsWith('.png') || fileName.endsWith('.jpg') || fileName.endsWith('.jpeg');
          
          if (fileName.endsWith('.png')) mimeType = 'image/png';
          else if (fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) mimeType = 'image/jpeg';
          
          // 2. Blob oluştur
          const blob = new Blob([data], { type: mimeType });
          const url = URL.createObjectURL(blob);
          
          // 3. Chrome önizleme ve yazdırma penceresi için yeni sekme
          if (isImage) {
             const win = window.open('', '_blank');
             if (win) {
                 win.document.write(`
                   <html>
                     <head><title>Önizleme ve Yazdır - ${fileName}</title></head>
                     <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#525659;">
                       <img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;" onload="window.setTimeout(() => { window.print(); }, 500);" />
                     </body>
                   </html>
                 `);
                 win.document.close();
             } else {
                 alert("Açılır pencere (pop-up) engellendi. Lütfen tarayıcınızdan pop-up'lara izin verin.");
             }
          } else {
             // PDF dosyaları için
             const win = window.open(url, '_blank');
             if (win) {
                 // Chrome'da native PDF önizleyici açılır. 
                 // Native önizleyicide otomatik yazdırmayı tetiklemek için:
                 setTimeout(() => {
                   try { win.print(); } catch(e) { console.warn("Native print API çağrısı engellendi, kullanıcı kendisi yazdırabilir."); }
                 }, 800);
             } else {
                 alert("Açılır pencere (pop-up) engellendi. Lütfen tarayıcınızdan pop-up'lara izin verin.");
             }
          }

          // Bellek sızıntılarını önlemek URL'i 2 dakika sonra temizle
          setTimeout(() => URL.revokeObjectURL(url), 120000);

        } catch (error) {
          console.error("Mega İndirme/Yazdırma Hatası:", error);
          alert("İşlem sırasında bir hata oluştu.");
        } finally {
          btnText.innerText = originalText;
          btn.classList.remove("opacity-50", "pointer-events-none");
        }
      };

      loadMegaFiles();

      // Animasyon
      setTimeout(() => {
        const container = document.getElementById('app-container');
        if (container) {
          container.classList.remove('opacity-0', 'scale-95', 'translate-y-4');
          container.classList.add('opacity-100', 'scale-100', 'translate-y-0');
        }
      }, 100);
    </script>
  </body>
</html>
